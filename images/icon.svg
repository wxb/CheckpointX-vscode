<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 主背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)"/>
  
  <!-- 代码括号形状 -->
  <path d="M42 38L28 64L42 90" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M86 38L100 64L86 90" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 中间检查点标记 -->
  <circle cx="64" cy="64" r="16" fill="#E74C3C"/>
  <circle cx="64" cy="64" r="8" fill="white"/>
  
  <!-- 底部小旗子表示检查点 -->
  <path d="M64 82L64 108" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M64 88L88 98L64 108" fill="#E74C3C"/>
</svg>